<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合同管理系统 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #F8FAFF 0%, #E8F0FB 100%);
        }
        .login-card { background: #FFFFFF; box-shadow: 0 8px 30px rgba(74, 111, 165, 0.12); }
        .btn-primary { background: #4A6FA5; transition: all 0.3s ease; }
        .btn-primary:hover { background: #3D5E8C; box-shadow: 0 4px 12px rgba(74, 111, 165, 0.3); }
        .input-field:focus { border-color: #4A6FA5; box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.15); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-[#4A6FA5] text-white text-2xl mb-4">
                <i class="fas fa-chart-line"></i>
            </div>
            <h1 class="text-2xl font-bold text-[#333333]">合同管理系统</h1>
            <p class="text-[#666666] text-sm mt-1">Business Operations Analytics</p>
        </div>
        <div class="login-card rounded-xl p-8">
            <h2 class="text-xl font-semibold text-[#333333] mb-6 text-center">系统登录</h2>
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-[#666666] mb-1.5">
                        <i class="fas fa-user text-[#4A6FA5] mr-1"></i> 用户名
                    </label>
                    <input type="text" id="username" placeholder="请输入用户名"
                        class="input-field w-full px-4 py-2.5 border border-gray-200 rounded-lg text-[#333333] outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-[#666666] mb-1.5">
                        <i class="fas fa-lock text-[#4A6FA5] mr-1"></i> 密码
                    </label>
                    <input type="password" id="password" placeholder="请输入密码"
                        class="input-field w-full px-4 py-2.5 border border-gray-200 rounded-lg text-[#333333] outline-none transition-all">
                </div>
                <div id="errorMsg" class="text-red-500 text-sm hidden">
                    <i class="fas fa-exclamation-circle mr-1"></i> <span id="errorText"></span>
                </div>
                <button type="submit" class="btn-primary w-full py-3 rounded-lg text-white font-medium text-base cursor-pointer">
                    <i class="fas fa-sign-in-alt mr-2"></i>登 录
                </button>
            </form>
            <div class="mt-4 pt-3 border-t border-gray-100 text-center text-[11px] text-[#BBBBBB]">
                <span class="inline-flex items-center gap-1"><i class="fas fa-info-circle"></i> 请输入用户名和密码登录</span>
            </div>
        </div>
    </div>
    <script>
        // 登录验证
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value.trim();
            var errorMsg = document.getElementById('errorMsg');
            var errorText = document.getElementById('errorText');
            errorMsg.classList.add('hidden');

            if (!username || !password) {
                errorText.textContent = '请输入用户名和密码';
                errorMsg.classList.remove('hidden');
                return;
            }

            // 账号验证：Admin 全权限 / User 部分权限
            var users = {
                'Admin': { password: 'admin123', role: 'admin', label: '管理员' },
                'User':  { password: 'user123',  role: 'user',  label: '普通用户' }
            };

            var record = users[username];
            if (record && password === record.password) {
                window.location.href = 'dashboard.html?user=' + encodeURIComponent(username) + '&role=' + encodeURIComponent(record.role) + '&t=' + Date.now();
            } else {
                errorText.textContent = '用户名或密码错误，请重新输入';
                errorMsg.classList.remove('hidden');
                var card = document.querySelector('.login-card');
                card.style.animation = 'none';
                void card.offsetHeight;
                card.style.animation = 'shake 0.4s ease';
            }
        });

        // 回车提交
        document.querySelectorAll('.input-field').forEach(function(input) {
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
                }
            });
        });

        // shake 动画
        var style = document.createElement('style');
        style.textContent = '@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }';
        document.head.appendChild(style);
    </script>
</body>
</html>
